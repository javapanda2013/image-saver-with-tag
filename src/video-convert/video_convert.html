<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>BorgesTag 動画 → GIF 変換</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #fff;
      font-family: sans-serif;
      color: #222;
    }
    #root {
      padding: 16px;
      display: flex;
      flex-direction: column;
      height: 100%;
      gap: 12px;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      color: #555;
    }
    .video-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f2f2f2;
      border: 1px solid #ddd;
      border-radius: 6px;
      overflow: hidden;
    }
    video {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .meta {
      font-size: 12px;
      color: #555;
      line-height: 1.6;
    }
    .meta .key { color: #888; margin-right: 4px; }
    .meta code { font-family: Consolas, monospace; background: #f5f5f5; padding: 1px 4px; border-radius: 3px; word-break: break-all; }
    .actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      padding: 8px 14px;
      background: #2b7a2b;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    button:disabled {
      background: #888;
      cursor: not-allowed;
    }
    button.secondary {
      background: #777;
    }
    .progress-wrap {
      display: none;
      flex: 1;
      min-width: 180px;
      background: #eee;
      border-radius: 4px;
      height: 18px;
      overflow: hidden;
      position: relative;
    }
    .progress-wrap.active { display: block; }
    .progress-bar {
      background: linear-gradient(90deg, #3c8c3c, #5caf5c);
      height: 100%;
      width: 0%;
      transition: width 0.15s ease-out;
    }
    .progress-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #333;
    }
    .log {
      font-size: 11px;
      color: #666;
      min-height: 1.4em;
    }
    .log.error { color: #c33; }
    .log.success { color: #2b7a2b; }
  </style>
  <script src="../vendor/gifshot.min.js"></script>
  <script src="video_convert.js"></script>
</head>
<body>
  <div id="root">
    <h1>🎬 動画 → GIF 変換（Phase 1 MVP）</h1>

    <div class="video-wrap">
      <video id="preview" controls muted playsinline></video>
    </div>

    <div class="meta" id="meta"></div>

    <div class="actions">
      <button id="convert-btn">GIF に変換</button>
      <button id="cancel-btn" class="secondary">キャンセル</button>
      <div class="progress-wrap" id="progress-wrap">
        <div class="progress-bar" id="progress-bar"></div>
        <div class="progress-label" id="progress-label">0%</div>
      </div>
    </div>

    <div class="log" id="log"></div>
  </div>
</body>
</html>
